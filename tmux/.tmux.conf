unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

set -g mouse on
set-option -g status-position bottom

# set-window-option -g automatic-rename off
# set-option -g allow-rename off

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind C-j display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | fzf --reverse --header='Switch Session:' --height=10 --border | xargs tmux switch-client -t"

set -g @plugin 'tmux-plugins/tpm'

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #{pane_current_command}"
set -g @catppuccin_window_current_text " #{pane_current_command}"
set -g @catppuccin_session_text " #{?#{==:#{session_name},0},base,#{session_name}}"
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

set-window-option -g automatic-rename on
set-window-option -g automatic-rename-format "#{pane_current_command}"
set-option -g allow-rename off

run '~/.tmux/plugins/tpm/tpm'
